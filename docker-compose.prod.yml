version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: interfinops-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - interfinops-internal

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: interfinops-backend-prod
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interfinops-internal

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: interfinops-frontend-prod
    restart: always
    networks:
      - interfinops-internal

  nginx:
    image: nginx:1.25-alpine
    container_name: interfinops-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - interfinops-internal

volumes:
  postgres_data:
    driver: local
  certbot_webroot:
    driver: local

networks:
  interfinops-internal:
    driver: bridge
    internal: false
